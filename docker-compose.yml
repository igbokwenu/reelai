services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reelai}
      POSTGRES_USER: ${POSTGRES_USER:-reelai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reelai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${REELAI_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://reelai:reelai@postgres:5432/reelai}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - reelai-data:/app/apps/web/.data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  migrate:
    profiles: ["setup"]
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${REELAI_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://reelai:reelai@postgres:5432/reelai}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
    command: ["sh", "-lc", "pnpm prisma migrate deploy && pnpm db:seed"]

volumes:
  postgres-data:
  reelai-data:
