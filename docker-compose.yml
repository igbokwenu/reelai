services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reelai}
      POSTGRES_USER: ${POSTGRES_USER:-reelai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reelai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  web:
    # The web server and migration job must run from the same image. Otherwise
    # `docker compose build web` can leave `migrate` on an older schema.
    image: reelai-web:latest
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${REELAI_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://reelai:reelai@postgres:5432/reelai}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
    expose:
      - "3000"
    volumes:
      - reelai-data:/app/apps/web/.data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  gateway:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      REELAI_SITE_ADDRESS: ${REELAI_SITE_ADDRESS:-http://localhost}
      REELAI_BASIC_AUTH_USER: ${REELAI_BASIC_AUTH_USER:-replace-with-judge-username}
      REELAI_BASIC_AUTH_HASH: ${REELAI_BASIC_AUTH_HASH:-replace-with-caddy-password-hash}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./scripts/deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  migrate:
    profiles: ["setup"]
    image: reelai-web:latest
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${REELAI_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://reelai:reelai@postgres:5432/reelai}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
    command: ["sh", "-lc", "pnpm prisma migrate deploy && pnpm db:seed"]

volumes:
  postgres-data:
  reelai-data:
  caddy-data:
  caddy-config:
